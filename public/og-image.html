<!DOCTYPE html>
<html>
<head>
<style>
  /*
    OG IMAGE GENERATOR
    ==================
    1. Open this file in Chrome
    2. Set browser window to 1200x630 pixels (OG image standard)
    3. Take a screenshot (Ctrl+Shift+S in DevTools > Capture full size screenshot)
    4. Save as og-image.png in the /public folder

    This gives you a professional OG image without needing design tools.
  */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0e17;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(77,166,255,0.2) 0%, transparent 70%);
  }
  .glow2 {
    position: absolute;
    bottom: -100px;
    left: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
  }
  .content {
    text-align: center;
    z-index: 1;
  }
  .logo-box {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #4da6ff, #8b5cf6);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 800;
    color: #fff;
    margin: 0 auto 32px;
  }
  h1 {
    font-size: 64px;
    font-weight: 800;
    color: #f8fafc;
    margin-bottom: 16px;
  }
  p {
    font-size: 28px;
    color: #94a3b8;
    max-width: 700px;
  }
  .badge {
    display: inline-block;
    padding: 8px 20px;
    background: rgba(77,166,255,0.15);
    border: 1px solid rgba(77,166,255,0.3);
    border-radius: 100px;
    color: #4da6ff;
    font-size: 16px;
    font-weight: 600;
    margin-top: 32px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo-box">M</div>
    <h1>CleanMark</h1>
    <p>Smart Markdown Extractor for AI Tools</p>
    <div class="badge">Chrome Extension</div>
  </div>
</body>
</html>
